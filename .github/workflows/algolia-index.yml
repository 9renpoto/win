name: Algolia Index Sync

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - posts/**
      - utils/posts.ts
      - scripts/sync_algolia_index.ts

permissions:
  contents: read

jobs:
  sync-index:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - name: Setup repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x

      - name: Sync Algolia index
        env:
          ALGOLIA_APP_ID: ${{ vars.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_API_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ vars.ALGOLIA_INDEX_NAME }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: deno run -A scripts/sync_algolia_index.ts
