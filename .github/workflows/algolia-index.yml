name: Algolia Index Sync

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - posts/**
      - utils/posts.ts
      - scripts/sync_algolia_index.ts

permissions:
  contents: read

jobs:
  sync-index:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - name: Setup repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Sync Algolia index
        env:
          ALGOLIA_APP_ID: ${{ vars.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_API_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ vars.ALGOLIA_INDEX_NAME }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: deno run -A scripts/sync_algolia_index.ts
